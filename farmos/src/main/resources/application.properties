spring.application.name=farmos

# Database connection from environment variables
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/farmos}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root@123}

# JPA / Hibernate behavior
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Keep secrets out of git. Set HUGGINGFACE_API_KEY or HF_TOKEN in your environment.
huggingface.api.key=${HUGGINGFACE_API_KEY:${HF_TOKEN:}}
huggingface.model.url=${HUGGINGFACE_MODEL_URL:https://router.huggingface.co/hf-inference/models/linkanjarad/mobilenet_v2_1.0_224-plant-disease-identification}

# Port your server runs on
server.port=${SERVER_PORT:8081}
