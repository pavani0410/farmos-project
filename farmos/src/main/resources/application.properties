spring.application.name=farmos
# Database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/farmos
spring.datasource.username=postgres
spring.datasource.password=root@123
# This auto-creates tables for you
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Keep secrets out of git. Set HUGGINGFACE_API_KEY or HF_TOKEN in your environment.
huggingface.api.key=${HUGGINGFACE_API_KEY:${HF_TOKEN:}}
huggingface.model.url=${HUGGINGFACE_MODEL_URL:https://router.huggingface.co/hf-inference/models/linkanjarad/mobilenet_v2_1.0_224-plant-disease-identification}

# Port your server runs on
server.port=8081
